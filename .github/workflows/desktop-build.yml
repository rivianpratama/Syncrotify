name: Desktop builds

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x64
            builder: --win nsis portable --x64
          - os: macos-13
            artifact: macos-x64
            builder: --mac dmg zip --x64
          - os: macos-14
            artifact: macos-arm64
            builder: --mac dmg zip --arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg --yes --no-progress

      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[desktop-ipod]" pyinstaller
          npm ci

      - name: Test
        run: npm run check

      - name: Build backend and resources
        run: |
          npm run prepare:resources
          npm run build:backend

      - name: Package desktop app
        run: npx electron-builder ${{ matrix.builder }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error
